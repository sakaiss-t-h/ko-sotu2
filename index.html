<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>高卒認定 数学 らくらく学習</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #FFF9F0;
  --surface: #FFFFFF;
  --primary: #FF7043;
  --primary-light: #FFCCBC;
  --accent: #42A5F5;
  --accent-light: #BBDEFB;
  --success: #66BB6A;
  --success-light: #C8E6C9;
  --text: #3E2723;
  --text-sub: #795548;
  --text-hint: #A1887F;
  --border: #EFEBE9;
  --shadow: rgba(62,39,35,0.08);
  --radius: 18px;
  --radius-sm: 12px;
}

/* ── 全体レイアウト ── */
body {
  background: var(--bg);
  font-family: 'Hiragino Rounded Gothic Pro', 'Yu Gothic', sans-serif;
  color: var(--text);
  /* iOSで画面全体を使う */
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── 画面切り替え ── */
.screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}
.screen.active { display: flex; }

/* ── スクロールエリア（iOSで確実にスクロールさせる） ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ── ヘッダー ── */
.header {
  background: var(--primary);
  padding: 14px 16px 12px;
  padding-top: max(14px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255,112,67,0.3);
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.25); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; flex-shrink: 0; cursor: pointer;
}
.back-btn:active { background: rgba(255,255,255,0.4); }
.header-text { flex: 1; }
.header-text h1 { color: #fff; font-size: 17px; font-weight: 700; }
.header-text .sub { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 1px; }

/* ── プログレスバー ── */
.prog-wrap { height: 4px; background: var(--border); flex-shrink: 0; }
.prog-fill { height: 4px; background: var(--primary); transition: width 0.3s; }

/* ── ホーム ── */
.hero-card {
  background: linear-gradient(135deg, #FF8A65, #FF5722);
  border-radius: var(--radius); padding: 22px 18px; margin-bottom: 20px;
  color: #fff; position: relative; overflow: hidden;
}
.hero-card::after { content: '📖'; position: absolute; right: 14px; bottom: 8px; font-size: 60px; opacity: 0.18; }
.hero-card h2 { font-size: 21px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; }
.hero-card p  { font-size: 13px; opacity: 0.9; line-height: 1.6; }
.section-label { font-size: 12px; font-weight: 700; color: var(--text-hint); letter-spacing: 0.08em; margin-bottom: 10px; padding-left: 2px; }
.unit-grid { display: flex; flex-direction: column; gap: 10px; }
.unit-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 10px var(--shadow); border: 1.5px solid var(--border);
  cursor: pointer;
}
.unit-card:active { opacity: 0.8; }
.unit-icon { width: 50px; height: 50px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.unit-info { flex: 1; min-width: 0; }
.unit-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.unit-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.badge-hot { background: #FFECB3; color: #F57F17; }
.badge-cnt { background: var(--accent-light); color: #1565C0; }
.unit-arrow { color: var(--text-hint); font-size: 20px; flex-shrink: 0; }

/* ── 単元画面 ── */
.unit-desc { background: var(--accent-light); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 14px; font-size: 13px; color: #1565C0; line-height: 1.6; }
.intro-btn {
  width: 100%; padding: 13px; margin-bottom: 14px;
  background: linear-gradient(135deg, #42A5F5, #1E88E5);
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 3px 10px rgba(66,165,245,0.3);
}
.intro-btn:active { opacity: 0.85; }
.prob-list { display: flex; flex-direction: column; gap: 10px; }
.prob-item {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 13px 15px; border: 1.5px solid var(--border);
  cursor: pointer; box-shadow: 0 1px 6px var(--shadow);
}
.prob-item:active { opacity: 0.8; }
.prob-header { display: flex; align-items: flex-start; gap: 8px; }
.pnum {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--primary); color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.prob-q { font-size: 14px; font-weight: 600; line-height: 1.5; flex: 1; }
.type-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 7px; font-weight: 700; display: inline-block; }
.tag-calc  { background: #F3E5F5; color: #7B1FA2; }
.tag-word  { background: #E8F5E9; color: #2E7D32; }
.tag-shape { background: #E3F2FD; color: #1565C0; }
.tag-func  { background: #FFF3E0; color: #E65100; }
.tag-other { background: #EFEBE9; color: #4E342E; }

/* ── 問題詳細 ── */
.q-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 18px 16px; margin-bottom: 14px;
  box-shadow: 0 2px 12px var(--shadow); border: 1.5px solid var(--border);
}
.qlabel { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.qtext  { font-size: 17px; font-weight: 700; line-height: 1.7; }
.choices { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.choice-btn {
  background: #FFF3E0; border: 1.5px solid #FFE0B2;
  border-radius: var(--radius-sm); padding: 13px 15px;
  font-size: 15px; font-weight: 600; color: #E65100;
  text-align: left; cursor: pointer; width: 100%;
}
.choice-btn:active { background: #FFE0B2; }
.choice-btn.correct { background: var(--success-light); border-color: var(--success); color: #1B5E20; }
.choice-btn.wrong   { background: #FFEBEE; border-color: #EF9A9A; color: #B71C1C; }
.reveal-btn {
  width: 100%; padding: 16px; background: var(--primary);
  border: none; border-radius: var(--radius);
  color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 12px rgba(255,112,67,0.35);
}
.reveal-btn:active { opacity: 0.85; }

/* ── 解説エリア ── */
.ans-area {
  background: var(--surface); border-radius: var(--radius);
  border: 2px solid var(--success); padding: 16px;
  margin-top: 12px; display: none;
}
.ans-area.open { display: block; }
.ans-label   { font-size: 12px; font-weight: 700; color: var(--success); margin-bottom: 6px; }
.ans-text    { font-size: 20px; font-weight: 800; margin-bottom: 14px; }
.exp-label   { font-size: 12px; font-weight: 700; color: var(--text-hint); margin-bottom: 8px; }
.exp-step { background: #F3F8FF; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 8px 12px; margin: 5px 0; font-weight: 600; color: #1565C0; font-size: 14px; }
.exp-warn { background: #FFF3E0; border-left: 3px solid #FF9800; border-radius: 0 8px 8px 0; padding: 8px 12px; margin: 5px 0; font-size: 13px; color: #E65100; }
.exp-tip  { background: #FFF8E1; border-left: 3px solid #FFC107; border-radius: 0 8px 8px 0; padding: 8px 12px; margin: 8px 0 0; font-size: 13px; color: #5D4037; font-weight: 700; }
.exp-line { padding: 2px 0; font-size: 14px; color: var(--text-sub); line-height: 1.7; }

.nav-btns { display: flex; gap: 10px; margin-top: 14px; }
.nav-btn {
  flex: 1; padding: 14px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; color: var(--text-sub); cursor: pointer;
}
.nav-btn:active { background: var(--border); }
.nav-btn.next { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── イントロ画面 ── */
.intro-hero {
  background: linear-gradient(135deg, #42A5F5, #1565C0);
  border-radius: var(--radius); padding: 20px 18px; margin-bottom: 18px; color: #fff;
}
.intro-hero-title { font-size: 18px; font-weight: 800; line-height: 1.4; }
.intro-section {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
  box-shadow: 0 2px 10px var(--shadow); border: 1.5px solid var(--border);
}
.intro-section-h { font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.intro-section-b { font-size: 14px; line-height: 1.9; color: var(--text-sub); white-space: pre-wrap; }
.start-btn {
  width: 100%; padding: 17px; background: var(--success);
  border: none; border-radius: var(--radius);
  color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
  margin-top: 6px; box-shadow: 0 4px 12px rgba(102,187,106,0.35);
}
.start-btn:active { opacity: 0.85; }

/* ── 共通パディング ── */
.page-pad { padding: 16px 16px 40px; }
.home-pad { padding: 18px 16px 36px; }
</style>
</head>
<body>

<!-- ホーム画面 -->
<div id="home" class="screen active">
  <div class="header">
    <div class="header-text">
      <h1>🌟 らくらく数学</h1>
      <div class="sub">高卒認定 対策アプリ</div>
    </div>
  </div>
  <div class="scroll-body home-pad">
    <div class="hero-card">
      <h2>むずかしくない！<br>いっしょにやってみよう</h2>
      <p>高卒認定の数学、よく出るところだけ集めました。<br>単元をタップして始めよう！</p>
    </div>
    <div class="section-label">📚 単元を選ぼう</div>
    <div class="unit-grid" id="unit-list"></div>
  </div>
</div>

<!-- 単元画面 -->
<div id="unit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <div class="header-text">
      <h1 id="unit-title">単元名</h1>
      <div class="sub" id="unit-sub"></div>
    </div>
  </div>
  <div class="scroll-body page-pad">
    <div class="unit-desc" id="unit-desc"></div>
    <button class="intro-btn" onclick="showIntro()">📖 まずここから読もう！基礎から解説</button>
    <div class="prob-list" id="prob-list"></div>
  </div>
</div>

<!-- 問題詳細画面 -->
<div id="detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('unit')">←</button>
    <div class="header-text">
      <h1 id="detail-unit"></h1>
      <div class="sub" id="detail-prog"></div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="scroll-body page-pad" id="detail-scroll">
    <div class="q-card">
      <div class="qlabel" id="detail-num"></div>
      <div class="qtext" id="detail-q"></div>
      <div class="choices" id="choices"></div>
    </div>
    <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">✨ こたえを見る</button>
    <div class="ans-area" id="ans-area">
      <div class="ans-label">✅ こたえ</div>
      <div class="ans-text" id="ans-text"></div>
      <div class="exp-label">💡 やさしい解説</div>
      <div id="exp-body"></div>
    </div>
    <div class="nav-btns" id="nav-btns" style="display:none">
      <button class="nav-btn" id="prev-btn" onclick="moveProblem(-1)">← 前へ</button>
      <button class="nav-btn next" id="next-btn" onclick="moveNext()">次へ →</button>
    </div>
  </div>
</div>

<!-- イントロ画面 -->
<div id="intro" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('unit')">←</button>
    <div class="header-text">
      <h1 id="intro-unit"></h1>
      <div class="sub">まず読もう</div>
    </div>
  </div>
  <div class="scroll-body page-pad">
    <div class="intro-hero">
      <div class="intro-hero-title" id="intro-title"></div>
    </div>
    <div id="intro-sections"></div>
    <button class="start-btn" onclick="showScreen('unit')">✏️ 問題を解いてみる！</button>
  </div>
</div>

<script>
const DATA = {
  units: [
    {
      unitName: "数と式の計算",
      icon: "🔢",
      color: "#FFF3E0",
      iconBg: "#FF8A65",
      hot: true,
      desc: "足し算・引き算・掛け算・割り算のルールを使って式を整理する問題です。「数を文字（x や y）で表す」のが数学の基本！",
      intro: {"title":"「文字」って何のためにあるの？","sections":[{"heading":"🤔 そもそも「x」って何？","body":"数学に出てくる「x」や「a」などの文字は、「まだわからない数」や「どんな数でも入る箱」のことです。\n\nたとえば「リンゴが何個かあって、3個食べたら残りは？」という問題。個数がわからないとき、とりあえず「x個」と呼ぶことにします。すると「残り＝x－3個」と書けます。\n\nxに10を入れれば10－3＝7個、xに20を入れれば20－3＝17個。1つの式でいろんな場合に対応できる、それが文字式の便利さです！"},{"heading":"📝 基本のルール3つ","body":"①【同じ文字は足せる】\n3x＋2x＝5x（リンゴ3個＋リンゴ2個＝5個と同じ）\n3x＋2y はそのまま（リンゴとミカンは別）\n\n②【カッコの外の数は中全員にかける】\n2(x＋3)＝2x＋6\n「2倍の袋に入れる」イメージ。袋ごと2倍するから中身も全部2倍。\n\n③【マイナスのかけ算】\n(－)×(－)＝(＋)　マイナスが2回→プラス\n(＋)×(－)＝(－)　マイナスが1回→マイナス"},{"heading":"⚡ よくある間違い","body":"❌ 3x＋2y＝5xy　→　文字が違うので足せません！\n❌ 2(x＋3)＝2x＋3　→　3にも2をかけます！2x＋6が正解\n❌ (－2)²＝－4　→　(－2)×(－2)＝＋4が正解！"}]},
      problems: [
        {
          question: "3x + 2x を計算しなさい。",
          type: "calc",
          choices: ["5x²", "6x", "x", "5x"],
          answer: "5x",
          explanation: "① 「x（エックス）」は「何かの数」を表す箱です。\n② 3x は「xが3個」、2x は「xが2個」という意味。\n③ リンゴ3個＋リンゴ2個＝5個と同じ。3x＋2x＝5x\n⚠️ 3x＋2y は足せない！x箱とy箱は別物です。\n💡 同じ文字のものだけ足せる。違う文字はそのまま！"
        },
        {
          question: "2(x + 3) を展開しなさい。",
          type: "calc",
          choices: ["2x + 5", "x + 6", "2x + 3", "2x + 6"],
          answer: "2x + 6",
          explanation: "① 2（カッコの外）を中の「x」と「3」全員にかけます。\n② 2×x＝2x、2×3＝6\n③ だから 2(x＋3)＝2x＋6\n⚠️ カッコの中の全員に配ること。1人でも忘れずに！\n💡 「分配法則」＝袋の外の数を中全員に配る！"
        },
        {
          question: "x² + 5x + 6 を因数分解しなさい。",
          type: "calc",
          choices: ["(x+1)(x+6)", "(x-2)(x-3)", "(x+2)(x+4)", "(x+2)(x+3)"],
          answer: "(x+2)(x+3)",
          explanation: "① かけて6、足して5になる2数を探す。\n② 2×3＝6、2＋3＝5 → 見つけた！\n③ x²＋5x＋6＝(x＋2)(x＋3)\n⚠️ 符号（＋－）を慎重に。マイナスがある場合は注意！\n💡 因数分解＝「かけると○、足すと○」の2数探しゲーム！"
        },
        {
          question: "(x+3)² を展開しなさい。",
          type: "calc",
          choices: ["x² + 6x + 9", "x² + 3x + 9", "x² + 9", "x² + 6x + 6"],
          answer: "x² + 6x + 9",
          explanation: "① (x＋3)²＝(x＋3)×(x＋3)と展開。\n② 公式 (a＋b)²＝a²＋2ab＋b²を使う。\n③ x²＋2×x×3＋3²＝x²＋6x＋9\n⚠️ 真ん中の2ab（今回は6x）を忘れがち！\n💡 正方形の面積図で考えると公式の意味がわかる！"
        },
        {
          question: "√12 を簡単にしなさい。",
          type: "calc",
          choices: ["3√2", "4√3", "2√6", "2√3"],
          answer: "2√3",
          explanation: "① 12＝4×3に分ける。\n② √4＝2なので外に出せる。\n③ √12＝2√3\n⚠️「外に出せる」のは2乗の数だけ（4,9,16,25...）。\n💡 ルートの中を「2乗できる数×残り」に分けよう！"
        },
        {
          question: "りんごが x 個あります。5個食べたら残りは何個ですか？",
          type: "word",
          choices: ["x - 5", "5 - x", "5x", "x + 5"],
          answer: "x - 5",
          explanation: "① x個持っていて5個減る。\n② x－5個が残る。\n③ 例：x＝10なら 10－5＝5個残り。\n⚠️「食べた」「使った」「減った」は引き算のサイン。\n💡 文章を「最初」「変化」「残り」の3つに分けよう！"
        },
        {
          question: "a = 3、b = -2 のとき、a² + b の値を求めなさい。",
          type: "calc",
          choices: ["5", "11", "7", "13"],
          answer: "7",
          explanation: "① a＝3を代入：3²＝3×3＝9\n② b＝－2なので 9＋(－2)＝9－2＝7\n③ マイナスを足す＝引き算と同じ！\n⚠️ 代入はカッコをつけると安全。(3)²のように。\n💡 代入＝文字の枠に数を「はめ込む」作業！"
        },
        {
          question: "1/2 + 1/3 を計算しなさい。",
          type: "calc",
          choices: ["5/6", "2/6", "2/5", "1/5"],
          answer: "5/6",
          explanation: "① 2と3の最小公倍数は6。分母を6にそろえる。\n② 1/2＝3/6、1/3＝2/6\n③ 3/6＋2/6＝5/6\n⚠️ 分母が違うまま足すのはNG！\n💡 通分＝ピザのスライスサイズをそろえてから足す！"
        },
        {
          question: "(-2)³ の値を求めなさい。",
          type: "calc",
          choices: ["-8", "-6", "8", "6"],
          answer: "-8",
          explanation: "① (－2)³＝(－2)×(－2)×(－2)\n② まず前2つ：(－2)×(－2)＝＋4\n③ 4×(－2)＝－8\n⚠️ マイナスを奇数回かけ→マイナス。偶数回→プラス。\n💡 「マイナスは1回かけるたびに＋と－が入れ替わる」！"
        },
        {
          question: "2x - 4 = 0 を x について解きなさい。",
          type: "calc",
          choices: ["x = 4", "x = -2", "x = 1", "x = 2"],
          answer: "x = 2",
          explanation: "① 天秤のバランスを保ちながら変形。\n② 両辺に4を足す：2x＝4\n③ 両辺を2で割る：x＝2\n⚠️ 片方に操作したら、必ず反対側にも同じ操作！\n💡 方程式は天秤。どちらも同じ操作でバランスを守る！"
        }
      ]
    },
    {
      unitName: "方程式・不等式",
      icon: "⚖️",
      color: "#E8F5E9",
      iconBg: "#66BB6A",

const tagMap   = {calc:"計算",word:"文章問題",shape:"図形",func:"関数",other:"その他"};
const tagClass = {calc:"tag-calc",word:"tag-word",shape:"tag-shape",func:"tag-func",other:"tag-other"};

let curUnit = 0, curProb = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // スクロールをトップに戻す
  const sb = document.querySelector('#' + id + ' .scroll-body');
  if (sb) sb.scrollTop = 0;
}

/* ── ホーム ── */
function renderHome() {
  document.getElementById('unit-list').innerHTML = DATA.units.map((u, i) => `
    <div class="unit-card" onclick="openUnit(${i})">
      <div class="unit-icon" style="background:${u.color}">${u.icon}</div>
      <div class="unit-info">
        <h3>${u.unitName}</h3>
        <div class="unit-meta">
          ${u.hot ? '<span class="badge badge-hot">⭐ 頻出</span>' : ''}
          <span class="badge badge-cnt">📝 ${u.problems.length}問</span>
        </div>
      </div>
      <div class="unit-arrow">›</div>
    </div>
  `).join('');
}

/* ── 単元 ── */
function openUnit(i) {
  curUnit = i;
  const u = DATA.units[i];
  document.getElementById('unit-title').textContent = u.icon + ' ' + u.unitName;
  document.getElementById('unit-sub').textContent = u.problems.length + '問';
  document.getElementById('unit-desc').textContent = u.desc;
  document.getElementById('prob-list').innerHTML = u.problems.map((p, j) => `
    <div class="prob-item" onclick="openProblem(${j})">
      <div class="prob-header">
        <div class="pnum">${j+1}</div>
        <div class="prob-q">${p.question}</div>
      </div>
      <span class="type-tag ${tagClass[p.type]||'tag-other'}">${tagMap[p.type]||'その他'}</span>
    </div>
  `).join('');
  showScreen('unit');
}

/* ── イントロ ── */
function showIntro() {
  const u = DATA.units[curUnit];
  if (!u.intro) return;
  document.getElementById('intro-unit').textContent = u.icon + ' ' + u.unitName;
  document.getElementById('intro-title').textContent = u.intro.title;
  document.getElementById('intro-sections').innerHTML = u.intro.sections.map(s => `
    <div class="intro-section">
      <div class="intro-section-h">${s.heading}</div>
      <div class="intro-section-b">${s.body}</div>
    </div>
  `).join('');
  showScreen('intro');
}

/* ── 問題 ── */
function openProblem(j) {
  curProb = j;
  renderProblem();
  showScreen('detail');
}

function renderProblem() {
  const u = DATA.units[curUnit];
  const p = u.problems[curProb];

  document.getElementById('detail-unit').textContent = u.icon + ' ' + u.unitName;
  document.getElementById('detail-prog').textContent = `問題 ${curProb+1} / ${u.problems.length}`;
  document.getElementById('detail-num').textContent = `問題 ${curProb+1}`;
  document.getElementById('detail-q').textContent = p.question;
  document.getElementById('ans-text').textContent = p.answer;
  document.getElementById('prog-fill').style.width = ((curProb+1)/u.problems.length*100) + '%';

  // 解説
  const lines = p.explanation.split('\n');
  document.getElementById('exp-body').innerHTML = lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    if (t.startsWith('①') || t.startsWith('②') || t.startsWith('③'))
      return `<div class="exp-step">${t}</div>`;
    if (t.startsWith('⚠️'))
      return `<div class="exp-warn">${t}</div>`;
    if (t.startsWith('💡'))
      return `<div class="exp-tip">${t}</div>`;
    return `<div class="exp-line">${t}</div>`;
  }).join('');

  // 選択肢
  const choicesEl = document.getElementById('choices');
  if (p.choices) {
    choicesEl.innerHTML = p.choices.map((c, i) => `
      <button class="choice-btn" onclick="selectChoice(this,'${c.replace(/'/g,"\'")}')">
        ${String.fromCharCode(65+i)}. ${c}
      </button>
    `).join('');
  } else {
    choicesEl.innerHTML = '';
  }

  // リセット
  document.getElementById('ans-area').classList.remove('open');
  document.getElementById('reveal-btn').textContent = '✨ こたえを見る';
  document.getElementById('nav-btns').style.display = 'none';

  // 前後ボタン
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.style.opacity = curProb === 0 ? '0.4' : '1';
  prev.disabled = curProb === 0;
  next.textContent = curProb === u.problems.length-1 ? '問題一覧へ' : '次へ →';
}

function selectChoice(btn, val) {
  const p = DATA.units[curUnit].problems[curProb];
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.style.pointerEvents = 'none';
    if (b.textContent.trim().slice(3) === p.answer) b.classList.add('correct');
  });
  if (val === p.answer) btn.classList.add('correct');
  else btn.classList.add('wrong');
  openAnswer();
}

function revealAnswer() {
  openAnswer();
}

function openAnswer() {
  document.getElementById('ans-area').classList.add('open');
  document.getElementById('reveal-btn').textContent = '✅ こたえ確認中';
  document.getElementById('nav-btns').style.display = 'flex';
  // 解説が見えるようにスクロール
  setTimeout(() => {
    const el = document.getElementById('ans-area');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function moveProblem(dir) {
  const u = DATA.units[curUnit];
  const next = curProb + dir;
  if (next < 0 || next >= u.problems.length) return;
  curProb = next;
  renderProblem();
  document.getElementById('detail-scroll').scrollTop = 0;
}

function moveNext() {
  const u = DATA.units[curUnit];
  if (curProb === u.problems.length - 1) {
    showScreen('unit');
  } else {
    moveProblem(1);
  }
}

renderHome();
</script>
</body>
</html>
